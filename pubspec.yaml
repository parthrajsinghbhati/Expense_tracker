name: smart_expense_tracker
description: A Smart Expense Tracker with Firestore-backed insights.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.7.0
  firebase_core: ^3.10.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  google_fonts: ^8.0.2
  http: ^1.6.0
  intl: ^0.20.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
